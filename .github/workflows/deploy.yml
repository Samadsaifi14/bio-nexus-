name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    # Render auto-deploys via Git on push, so a missing deploy-hook secret is non-fatal.
    continue-on-error: true
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure backend API URL is set
        run: npx vercel env add NEXT_PUBLIC_API_URL production https://bio-nexus-api.onrender.com --scope team_y6MYl4hpatRBHMHSwAzCzQ5f --cwd bioai-platform/frontend --token "$VERCEL_TOKEN" || true
      - name: Deploy to Vercel
        run: npx vercel --token "$VERCEL_TOKEN" --scope team_y6MYl4hpatRBHMHSwAzCzQ5f --prod --cwd bioai-platform/frontend --yes
