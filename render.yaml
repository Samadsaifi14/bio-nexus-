services:
  - type: web
    name: bio-nexus-api
    runtime: python
    region: ohio
    rootDir: bioai-platform/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEMO_MODE
        value: "true"
      - key: CORS_ORIGIN
        value: "https://bioai-platform.vercel.app"
