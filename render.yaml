services:
  - type: web
    name: bio-nexus-api
    runtime: docker
    region: ohio
    rootDir: bioai-platform/backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEMO_MODE
        value: "true"
      - key: CORS_ORIGIN
        value: "https://bioai-platform.vercel.app"
